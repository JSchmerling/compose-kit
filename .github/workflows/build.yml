name: Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - uses: gradle/actions/setup-gradle@v6

      - name: Lint
        run: ./gradlew ktlintCheck

  build:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - uses: gradle/actions/setup-gradle@v6

      - name: Build
        run: ./gradlew build

  # The iOS targets are declared for every host, but Kotlin/Native can only compile Apple targets
  # on a macOS host (the compile tasks are disabled on Linux), so they are built here on macOS.
  ios:
    needs: lint
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - uses: gradle/actions/setup-gradle@v6

      - name: Compile iOS targets
        run: ./gradlew :lib:compileKotlinIosArm64 :lib:compileKotlinIosSimulatorArm64
